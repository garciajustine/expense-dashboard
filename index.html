<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Expense Ledger</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Crect%20width%3D%2264%22%20height%3D%2264%22%20rx%3D%2214%22%20fill%3D%22%2314171C%22/%3E%3Cpath%20d%3D%22M18%2010h28a3%203%200%200%201%203%203v38l-5-4-5%204-5-4-5%204-5-4-5%204-5-4V13a3%203%200%200%201%203-3z%22%20fill%3D%22%231B1F27%22%20stroke%3D%22%23F2C744%22%20stroke-width%3D%222.5%22%20stroke-linejoin%3D%22round%22/%3E%3Cline%20x1%3D%2223%22%20y1%3D%2222%22%20x2%3D%2241%22%20y2%3D%2222%22%20stroke%3D%22%23F2C744%22%20stroke-width%3D%222.5%22%20stroke-linecap%3D%22round%22/%3E%3Cline%20x1%3D%2223%22%20y1%3D%2230%22%20x2%3D%2241%22%20y2%3D%2230%22%20stroke%3D%22%235F6673%22%20stroke-width%3D%222.5%22%20stroke-linecap%3D%22round%22/%3E%3Cpath%20d%3D%22M23%2039l4%204%208-8%22%20stroke%3D%22%234FCBAF%22%20stroke-width%3D%223%22%20fill%3D%22none%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14171C;
    --panel: #1B1F27;
    --panel-2: #21262F;
    --line: #2C323D;
    --line-soft: #23282f;
    --text: #EDEFF3;
    --text-dim: #9299A8;
    --text-faint: #5F6673;
    --gold: #F2C744;
    --gold-dim: #6b5b23;
    --teal: #4FCBAF;
    --teal-dim: #204538;
    --red: #E0654B;
    --red-dim: #4a2620;
    --violet: #9B8CF2;
    --violet-dim: #362F63;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    padding: 40px 24px 80px;
  }
  .wrap { max-width: 1180px; margin: 0 auto; }

  .dash-grid {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 20px;
    align-items: start;
  }
  .main-col { min-width: 0; }
  .side-col { display: flex; flex-direction: column; gap: 14px; }
  @media (max-width: 900px) {
    .dash-grid { grid-template-columns: 1fr; }
  }

  .side-card {
    background: var(--panel);
    border: 1px solid var(--line-soft);
    border-radius: 10px;
    padding: 16px;
  }
  .side-card-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin: 0 0 12px;
  }

  .inst-empty { font-size: 12.5px; color: var(--text-faint); line-height: 1.5; }
  .inst-item { padding: 10px 0; border-bottom: 1px solid var(--line-soft); }
  .inst-item:last-child { border-bottom: none; padding-bottom: 0; }
  .inst-item-name { font-size: 13px; font-weight: 500; margin: 0 0 6px; }
  .inst-item-row { display: flex; justify-content: space-between; align-items: center; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
  .inst-progress-track { height: 5px; background: var(--line-soft); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
  .inst-progress-fill { height: 100%; background: var(--violet); border-radius: 3px; }
  #tab-personal .inst-progress-fill { background: var(--gold); }
  .inst-remaining { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: var(--text); }
  .inst-remaining span { color: var(--text-faint); }

  .cal-header { display: flex; justify-content: center; margin-bottom: 10px; }
  .cal-title { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px; margin: 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-dow { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--text-faint); text-align: center; padding-bottom: 4px; }
  .cal-day {
    aspect-ratio: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 5px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    cursor: default;
    position: relative;
  }
  .cal-day.has-due { cursor: pointer; background: var(--panel-2); color: var(--text); }
  .cal-day.has-due:hover { background: var(--line); }
  .cal-day.armed { outline: 1.5px solid var(--gold); background: var(--gold-dim); color: var(--text); }
  .cal-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--teal); margin-top: 2px; }
  #tab-shared .cal-dot { background: var(--violet); }
  .cal-hint { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: var(--text-faint); margin: 10px 0 0; line-height: 1.5; }
  .cal-hint.armed-hint { color: var(--gold); }


  .tabs { display: flex; gap: 6px; margin-bottom: 20px; }
  .tab-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: .05em;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 7px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--text-faint);
    cursor: pointer;
  }
  .tab-btn:hover { color: var(--text-dim); border-color: var(--text-faint); }
  .tab-btn.active { color: #14171C; font-weight: 600; }
  .tab-btn.active[data-tab="personal"] { background: var(--gold); border-color: var(--gold); }
  .tab-btn.active[data-tab="shared"] { background: var(--violet); border-color: var(--violet); }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin: 0 0 6px;
  }
  #tab-personal .eyebrow, .accent-gold { color: var(--gold); }
  #tab-shared .eyebrow, .accent-violet { color: var(--violet); }
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 30px;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .month-controls { display: flex; align-items: center; gap: 8px; }
  select {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 9px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    cursor: pointer;
  }
  button {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 6px;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--text);
    padding: 9px 14px;
    transition: border-color .15s, background .15s;
  }
  button:hover { border-color: var(--text-faint); background: var(--panel-2); }
  .btn-ghost { border-color: transparent; background: transparent; color: var(--text-dim); }
  .btn-ghost:hover { background: var(--panel); border-color: var(--line); color: var(--text); }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat {
    background: var(--panel);
    border: 1px solid var(--line-soft);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin: 0 0 8px;
  }
  .stat-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
    margin: 0;
  }
  .stat-sub { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: var(--text-dim); margin-top: 4px; }
  .stat.remaining .stat-value.g { color: var(--gold); }
  .stat.remaining .stat-value.v { color: var(--violet); }
  .stat.paid .stat-value { color: var(--teal); }

  .progress-track {
    height: 6px;
    background: var(--line-soft);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 10px;
  }
  .progress-fill {
    height: 100%;
    background: var(--teal);
    border-radius: 3px;
    transition: width .3s ease;
  }

  .ledger {
    background: var(--panel);
    border: 1px solid var(--line-soft);
    border-radius: 10px;
    overflow: hidden;
  }
  .ledger-head {
    display: grid;
    grid-template-columns: 22px 1fr 110px 120px 110px 32px;
    gap: 10px;
    padding: 12px 18px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-faint);
    border-bottom: 1px solid var(--line-soft);
  }
  .row {
    display: grid;
    grid-template-columns: 22px 1fr 110px 120px 110px 32px;
    gap: 10px;
    align-items: center;
    padding: 10px 18px;
    border-bottom: 1px solid var(--line-soft);
  }
  .row:last-child { border-bottom: none; }
  .row.is-paid { background: rgba(79,203,175,0.045); }
  .row.dragging { opacity: 0.35; }
  .row.drag-over-top { box-shadow: inset 0 2px 0 var(--gold); }
  .row.drag-over-bottom { box-shadow: inset 0 -2px 0 var(--gold); }

  .drag-handle {
    width: 20px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-faint);
    cursor: grab;
    user-select: none;
    touch-action: none;
  }
  .drag-handle:hover { color: var(--text-dim); }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle svg { width: 13px; height: 13px; }

  .name-cell input {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 5px 6px;
    border-radius: 5px;
  }
  .name-cell input:hover, .name-cell input:focus { background: var(--panel-2); outline: none; }
  .due-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--text-faint);
    padding: 1px 6px 0;
  }
  .due-tag input[type="text"] {
    background: transparent;
    border: none;
    color: var(--text-faint);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    width: 100%;
    padding: 2px 0;
    flex: 1;
    min-width: 0;
  }
  .due-tag input[type="text"]:hover, .due-tag input[type="text"]:focus { color: var(--text-dim); outline: none; }

  .date-picker-wrap {
    position: relative;
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    border-radius: 4px;
  }
  .date-picker-wrap:hover { background: var(--panel-2); }
  .date-picker-wrap svg {
    position: absolute;
    inset: 0;
    margin: auto;
    width: 13px;
    height: 13px;
    color: var(--text-faint);
    pointer-events: none;
  }
  .date-picker-wrap.has-date svg { color: var(--teal); }
  #tab-personal .date-picker-wrap.has-date svg { color: var(--gold); }
  .date-picker-wrap input[type="date"] {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    border: none;
    padding: 0;
    margin: 0;
    cursor: pointer;
    color-scheme: dark;
  }

  .inst-toggle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    padding: 3px 6px 0;
    cursor: pointer;
    display: inline-block;
  }
  .inst-toggle:hover { color: var(--gold); }
  .inst-toggle.on { color: var(--violet); }
  #tab-personal .inst-toggle.on { color: var(--gold); }
  .inst-row-fields {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 6px 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--text-faint);
  }
  .inst-row-fields input {
    width: 40px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    padding: 2px 4px;
    border-radius: 4px;
    text-align: center;
  }
  .inst-row-fields input:focus { outline: none; border-color: var(--gold); }

  .amount-cell { display: flex; align-items: center; gap: 3px; }
  .amount-cell span { color: var(--text-faint); font-family: 'IBM Plex Mono', monospace; font-size: 13px; }
  .amount-cell input {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 6px 7px;
    border-radius: 5px;
    text-align: right;
  }
  .amount-cell input:focus { outline: none; border-color: var(--gold); }

  .paid-cell { display: flex; align-items: center; gap: 8px; }
  .checkbox {
    width: 20px; height: 20px;
    border-radius: 5px;
    border: 1.5px solid var(--line);
    background: var(--panel-2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all .12s;
  }
  .checkbox.checked { background: var(--teal); border-color: var(--teal); }
  .checkbox svg { width: 12px; height: 12px; display: none; }
  .checkbox.checked svg { display: block; }
  .paid-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    color: var(--text-faint);
  }
  .row.is-paid .paid-label { color: var(--teal); }

  .date-cell {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    color: var(--text-dim);
  }
  .date-cell input {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    width: 100%;
    padding: 2px 0;
  }
  .date-cell input:hover, .date-cell input:focus { color: var(--text); outline: none; }
  .date-cell.empty input { color: var(--text-faint); }

  .del-btn {
    width: 26px; height: 26px;
    border-radius: 5px;
    border: none;
    background: transparent;
    color: var(--text-faint);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    padding: 0;
  }
  .del-btn:hover { background: var(--red-dim); color: var(--red); }

  .add-row { padding: 12px 18px; display: flex; }
  .add-row button { width: 100%; border-style: dashed; color: var(--text-dim); }
  .add-row button:hover { color: var(--gold); border-color: var(--gold-dim); }
  #tab-shared .add-row button:hover { color: var(--violet); border-color: var(--violet-dim); }

  .footer-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
  }
  .footer-note {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
  }

  .panel-view { display: none; }
  .panel-view.active { display: block; }

  #setup-gate {
    max-width: 480px;
    margin: 80px auto;
    background: var(--panel);
    border: 1px solid var(--line-soft);
    border-radius: 12px;
    padding: 28px 26px;
  }
  #setup-gate h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    margin: 0 0 6px;
  }
  #setup-gate p { color: var(--text-dim); font-size: 13.5px; line-height: 1.6; margin: 0 0 18px; }
  #setup-gate label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin: 14px 0 6px;
  }
  #setup-gate input {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 6px;
  }
  #setup-gate input:focus { outline: none; border-color: var(--gold); }
  #setup-error { color: var(--red); font-size: 12.5px; margin-top: 10px; min-height: 16px; }
  #setup-gate .actions { display: flex; gap: 8px; margin-top: 20px; }
  #app-content { display: none; }
  #app-content.ready { display: block; }
  #reset-config {
    position: fixed; bottom: 16px; right: 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--text-faint);
    background: none; border: none; cursor: pointer;
    opacity: 0.5;
  }
  #reset-config:hover { opacity: 1; }


  @media (max-width: 640px) {
    .stats { grid-template-columns: 1fr 1fr; }
    .ledger-head { display: none; }
    .row {
      grid-template-columns: 1fr;
      row-gap: 8px;
      padding: 14px 16px;
    }
    .amount-cell, .paid-cell, .date-cell { justify-content: space-between; }
    .amount-cell::before { content: 'Amount'; color: var(--text-faint); font-family: 'IBM Plex Mono', monospace; font-size: 10px; margin-right: auto; }
    .date-cell::before { content: 'Paid on'; color: var(--text-faint); font-family: 'IBM Plex Mono', monospace; font-size: 10px; }
    .del-btn { justify-self: end; }
  }
</style>
</head>
<body>

<div id="setup-gate">
  <h2>Connect your Google Sheet</h2>
  <p>Paste the Web App URL and passphrase from your Apps Script deployment. This is saved only in this browser — never sent anywhere except your own script.</p>
  <label for="cfg-url">Web app URL</label>
  <input type="text" id="cfg-url" placeholder="https://script.google.com/macros/s/.../exec" />
  <label for="cfg-pass">Passphrase</label>
  <input type="password" id="cfg-pass" placeholder="Your passphrase" />
  <div id="setup-error"></div>
  <div class="actions">
    <button class="btn-ghost" id="cfg-connect" style="flex:1; background: var(--gold); color:#2A2107; font-weight:600; border-color: var(--gold);">Connect</button>
  </div>
</div>

<div id="app-content">
  <div class="wrap">

    <div class="tabs">
      <button class="tab-btn active" data-tab="personal">Personal</button>
      <button class="tab-btn" data-tab="shared">Shared</button>
    </div>

    <div id="tab-personal" class="panel-view active"></div>
    <div id="tab-shared" class="panel-view"></div>

  </div>
</div>

<button id="reset-config" title="Disconnect this browser from the sheet">Disconnect sheet</button>

<script>
const PANEL_TEMPLATE = (id, kind) => `
  <div class="topbar">
    <div>
      <p class="eyebrow">${kind === 'personal' ? 'Personal &middot; &#8369; PHP' : 'Shared &middot; &#8369; PHP'}</p>
      <h1 id="${id}-month-title">Expense Ledger</h1>
    </div>
    <div class="month-controls">
      <select id="${id}-month-select"></select>
      <button class="btn-ghost" id="${id}-new-month-btn" title="Add a new month">+ Month</button>
    </div>
  </div>

  <div class="dash-grid">
    <div class="main-col">
      <div class="stats">
        <div class="stat">
          <p class="stat-label">Total due</p>
          <p class="stat-value" id="${id}-stat-total">&#8369;0</p>
          <p class="stat-sub" id="${id}-stat-count">0 items</p>
        </div>
        <div class="stat paid">
          <p class="stat-label">Paid so far</p>
          <p class="stat-value" id="${id}-stat-paid">&#8369;0</p>
          <div class="progress-track"><div class="progress-fill" id="${id}-progress-fill" style="width:0%"></div></div>
        </div>
        <div class="stat remaining">
          <p class="stat-label">Still owed</p>
          <p class="stat-value ${kind === 'personal' ? 'g' : 'v'}" id="${id}-stat-remaining">&#8369;0</p>
          <p class="stat-sub" id="${id}-stat-pct">0% paid</p>
        </div>
      </div>

      <div class="ledger">
        <div class="ledger-head">
          <div></div>
          <div>Expense</div>
          <div style="text-align:right">Amount</div>
          <div>Paid</div>
          <div>Paid on</div>
          <div></div>
        </div>
        <div id="${id}-rows"></div>
        <div class="add-row">
          <button id="${id}-add-expense-btn">+ Add expense</button>
        </div>
      </div>

      <div class="footer-actions">
        <span class="footer-note" id="${id}-save-note">Saved automatically to this browser</span>
        <button class="btn-ghost" id="${id}-dup-btn">Copy previous month &rarr;</button>
      </div>
    </div>

    <div class="side-col">
      <div class="side-card">
        <p class="side-card-title">Installments</p>
        <div id="${id}-installments"></div>
      </div>
      <div class="side-card">
        <p class="side-card-title">Payment calendar</p>
        <div class="cal-header"><p class="cal-title" id="${id}-cal-title">Month</p></div>
        <div class="cal-grid" id="${id}-cal-grid"></div>
        <p class="cal-hint" id="${id}-cal-hint">Click a due date, then click a new date to move it.</p>

`;

const CONFIG_KEY = 'expense-dashboard-config';

function getConfig() {
  try { return JSON.parse(localStorage.getItem(CONFIG_KEY)); } catch (e) { return null; }
}
function saveConfig(cfg) { localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg)); }
function clearConfig() { localStorage.removeItem(CONFIG_KEY); }

async function apiCall(action, key, value) {
  const cfg = getConfig();
  if (!cfg) throw new Error('not configured');
  const params = new URLSearchParams({ action, pass: cfg.pass });
  if (key !== undefined) params.set('key', key);
  if (value !== undefined) params.set('value', value);
  const res = await fetch(cfg.url + '?' + params.toString(), { method: 'GET' });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

const storage = {
  async get(key) {
    const d = await apiCall('get', key);
    return (d.value !== null && d.value !== undefined) ? { value: d.value } : null;
  },
  async set(key, value) {
    await apiCall('set', key, value);
    return { key, value };
  }
};

document.getElementById('cfg-connect').addEventListener('click', async () => {
  const url = document.getElementById('cfg-url').value.trim();
  const pass = document.getElementById('cfg-pass').value;
  const errEl = document.getElementById('setup-error');
  errEl.textContent = '';
  if (!url || !pass) { errEl.textContent = 'Enter both the web app URL and your passphrase.'; return; }
  const btn = document.getElementById('cfg-connect');
  btn.textContent = 'Connecting…';
  try {
    const pingParams = new URLSearchParams({ action: 'ping', pass });
    const res = await fetch(url + '?' + pingParams.toString(), { method: 'GET' });
    const data = await res.json();
    if (data.error) throw new Error(data.error === 'unauthorized' ? 'Wrong passphrase.' : data.error);
    saveConfig({ url, pass });
    document.getElementById('setup-gate').style.display = 'none';
    document.getElementById('app-content').classList.add('ready');
    startApp();
  } catch (e) {
    errEl.textContent = 'Could not connect: ' + e.message + '. Check the URL and passphrase.';
  } finally {
    btn.textContent = 'Connect';
  }
});

document.getElementById('reset-config').addEventListener('click', () => {
  if (confirm('Disconnect this browser from your sheet? You can reconnect anytime with the same URL and passphrase.')) {
    clearConfig();
    location.reload();
  }
});

function makeTracker(id, kind) {
  const MONTH_LIST_KEY = 'expense-months-list:' + kind;
  const monthKeyFn = (m) => 'expenses:' + kind + ':' + m;
  const LEGACY_MONTH_LIST_KEY = kind === 'personal' ? 'expense-months-list' : null;
  const legacyMonthKeyFn = (m) => 'expenses:' + m;

  const state = { months: [], currentMonth: SEEDS[kind].month, items: [], idCounter: 1, selectedMoveId: null };

  function uid() { return id + '_' + (state.idCounter++) + '_' + Date.now().toString(36); }

  function monthLabel(key) {
    const [y, m] = key.split('-').map(Number);
    return new Date(y, m - 1, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  }

  function todayStr() {
    const d = new Date();
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  async function loadMonthsList() {
    try {
      const res = await storage.get(MONTH_LIST_KEY, false);
      if (res && res.value) return JSON.parse(res.value);
    } catch (e) {}
    if (LEGACY_MONTH_LIST_KEY) {
      try {
        const res = await storage.get(LEGACY_MONTH_LIST_KEY, false);
        if (res && res.value) return JSON.parse(res.value);
      } catch (e) {}
    }
    return null;
  }

  async function saveMonthsList() {
    try { await storage.set(MONTH_LIST_KEY, JSON.stringify(state.months), false); } catch (e) {}
  }

  async function loadMonth(key) {
    try {
      const res = await storage.get(monthKeyFn(key), false);
      if (res && res.value) return JSON.parse(res.value).map(it => ({ ...it, id: it.id || uid() }));
    } catch (e) {}
    if (LEGACY_MONTH_LIST_KEY) {
      try {
        const res = await storage.get(legacyMonthKeyFn(key), false);
        if (res && res.value) return JSON.parse(res.value).map(it => ({ ...it, id: it.id || uid() }));
      } catch (e) {}
    }
    return null;
  }

  async function saveMonth(key, data) {
    try {
      await storage.set(monthKeyFn(key), JSON.stringify(data), false);
      flashSaved();
    } catch (e) {
      document.getElementById(id + '-save-note').textContent = 'Could not save — check connection';
    }
  }

  let flashTimer = null;
  function flashSaved() {
    const note = document.getElementById(id + '-save-note');
    note.textContent = 'Saved just now';
    clearTimeout(flashTimer);
    flashTimer = setTimeout(() => { note.textContent = 'Saved automatically to this browser'; }, 1800);
  }

  function peso(n) {
    return '\u20b1' + Number(n || 0).toLocaleString('en-PH', { maximumFractionDigits: 2 });
  }

  function renderMonthSelect() {
    const sel = document.getElementById(id + '-month-select');
    sel.innerHTML = '';
    state.months.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = monthLabel(m);
      if (m === state.currentMonth) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  function renderStats() {
    const total = state.items.reduce((s, i) => s + Number(i.amount || 0), 0);
    const paidTotal = state.items.filter(i => i.paid).reduce((s, i) => s + Number(i.amount || 0), 0);
    const remaining = total - paidTotal;
    const pct = total > 0 ? Math.round((paidTotal / total) * 100) : 0;

    document.getElementById(id + '-stat-total').textContent = peso(total);
    document.getElementById(id + '-stat-count').textContent = state.items.length + (state.items.length === 1 ? ' item' : ' items');
    document.getElementById(id + '-stat-paid').textContent = peso(paidTotal);
    document.getElementById(id + '-stat-remaining').textContent = peso(remaining);
    document.getElementById(id + '-stat-pct').textContent = pct + '% paid';
    document.getElementById(id + '-progress-fill').style.width = pct + '%';
    document.getElementById(id + '-month-title').textContent = monthLabel(state.currentMonth);
  }

  function renderInstallments() {
    const container = document.getElementById(id + '-installments');
    if (!container) return;
    const items = state.items.filter(i => i.isInstallment);
    if (!items.length) {
      container.innerHTML = '<p class="inst-empty">No installments yet. Click "+ Installment" under any expense to track payments made and balance left.</p>';
      return;
    }
    container.innerHTML = items.map(item => {
      const total = item.instTotal;
      const paidCount = item.instPaid || 0;
      const pct = total ? Math.min(100, Math.round((paidCount / total) * 100)) : 0;
      const remainingBal = total ? Math.max(0, (total - paidCount) * Number(item.amount || 0)) : null;
      return `
        <div class="inst-item">
          <p class="inst-item-name">${escapeAttr(item.name || '(unnamed)')}</p>
          <div class="inst-item-row"><span>${paidCount} / ${total || '?'} payments</span><span>${total ? pct + '%' : ''}</span></div>
          <div class="inst-progress-track"><div class="inst-progress-fill" style="width:${pct}%"></div></div>
          <div class="inst-remaining">${remainingBal !== null ? peso(remainingBal) + ' <span>left</span>' : '<span>Set total payments to see balance</span>'}</div>
        </div>
      `;
    }).join('');
  }

  function dayOfMonth(dateStr) {
    if (!dateStr) return null;
    const parts = dateStr.split('-');
    if (parts.length !== 3) return null;
    const [y, m] = parts;
    if (`${y}-${m}` !== state.currentMonth) return null;
    return parseInt(parts[2], 10);
  }

  function renderCalendar() {
    const grid = document.getElementById(id + '-cal-grid');
    const titleEl = document.getElementById(id + '-cal-title');
    const hintEl = document.getElementById(id + '-cal-hint');
    if (!grid) return;
    titleEl.textContent = monthLabel(state.currentMonth);

    const [y, m] = state.currentMonth.split('-').map(Number);
    const daysInMonth = new Date(y, m, 0).getDate();
    const firstWeekday = new Date(y, m - 1, 1).getDay();

    const dueMap = {};
    state.items.forEach(item => {
      const d = dayOfMonth(item.dueDate);
      if (d) { (dueMap[d] = dueMap[d] || []).push(item); }
    });

    const armedItem = state.selectedMoveId ? getItem(state.selectedMoveId) : null;
    const armedDay = armedItem ? dayOfMonth(armedItem.dueDate) : null;

    let html = ['Su','Mo','Tu','We','Th','Fr','Sa'].map(d => `<div class="cal-dow">${d}</div>`).join('');
    for (let i = 0; i < firstWeekday; i++) html += '<div class="cal-day"></div>';
    for (let day = 1; day <= daysInMonth; day++) {
      const due = dueMap[day];
      const classes = ['cal-day'];
      if (due) classes.push('has-due');
      if (armedDay === day) classes.push('armed');
      html += `<div class="${classes.join(' ')}" data-day="${day}">${day}${due ? `<div class="cal-dot"></div>` : ''}</div>`;
    }
    grid.innerHTML = html;

    if (armedItem) {
      hintEl.textContent = `Moving "${armedItem.name || '(unnamed)'}" — click a new date, or click its current date again to cancel.`;
      hintEl.classList.add('armed-hint');
    } else {
      hintEl.textContent = 'Click a due date, then click a new date to move it.';
      hintEl.classList.remove('armed-hint');
    }
  }

  document.getElementById(id + '-cal-grid').addEventListener('click', (e) => {
    const cell = e.target.closest('.cal-day');
    if (!cell || !cell.dataset.day) return;
    const day = parseInt(cell.dataset.day, 10);
    const [y, m] = state.currentMonth.split('-').map(Number);
    const clickedDate = `${y}-${String(m).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

    if (state.selectedMoveId) {
      const item = getItem(state.selectedMoveId);
      state.selectedMoveId = null;
      if (item) {
        item.dueDate = clickedDate;
        renderRows();
        persist();
      }
      renderCalendar();
      return;
    }

    const dueItems = state.items.filter(i => dayOfMonth(i.dueDate) === day);
    if (!dueItems.length) return;
    if (dueItems.length === 1) {
      state.selectedMoveId = dueItems[0].id;
    } else {
      const list = dueItems.map((it, idx) => `${idx + 1}. ${it.name || '(unnamed)'}`).join('\n');
      const choice = window.prompt(`Multiple expenses due this day — enter a number to move one:\n${list}`);
      const idx = parseInt(choice, 10) - 1;
      if (dueItems[idx]) state.selectedMoveId = dueItems[idx].id;
    }
    renderCalendar();
  });

  function escapeAttr(s) {
    return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
  }

  function formatDueDate(dateStr) {
    const parts = (dateStr || '').split('-');
    if (parts.length !== 3) return dateStr;
    const [y, m, d] = parts.map(Number);
    const dt = new Date(y, m - 1, d);
    return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function renderRows() {
    const container = document.getElementById(id + '-rows');
    container.innerHTML = '';
    state.items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'row' + (item.paid ? ' is-paid' : '');
      row.dataset.id = item.id;
      row.draggable = true;
      row.innerHTML = `
        <div class="drag-handle" data-field="drag" aria-label="Drag to reorder" title="Drag to reorder">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.5"/><circle cx="15" cy="6" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="18" r="1.5"/><circle cx="15" cy="18" r="1.5"/></svg>
        </div>
        <div class="name-cell">
          <input type="text" value="${escapeAttr(item.name)}" data-field="name" placeholder="Expense name" />
          <div class="due-tag">
            <input type="text" value="${escapeAttr(item.due || '')}" data-field="due" placeholder="Notes" />
            <div class="date-picker-wrap ${item.dueDate ? 'has-date' : ''}" title="${item.dueDate ? formatDueDate(item.dueDate) : 'Set due date'}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/></svg>
              <input type="date" value="${escapeAttr(item.dueDate || '')}" data-field="dueDate" title="Payment due date" />
            </div>
          </div>
          <div class="inst-toggle ${item.isInstallment ? 'on' : ''}" data-field="instToggle">${item.isInstallment ? '&#10003; Installment' : '+ Installment'}</div>
          ${item.isInstallment ? `
          <div class="inst-row-fields">
            <input type="number" min="0" value="${item.instPaid || 0}" data-field="instPaid" title="Payments made" />
            <span>/</span>
            <input type="number" min="0" value="${item.instTotal || ''}" data-field="instTotal" placeholder="total" title="Total payments" />
            <span>paid</span>
          </div>` : ''}
        </div>
        <div class="amount-cell">
          <span>&#8369;</span>
          <input type="number" step="0.01" value="${item.amount}" data-field="amount" />
        </div>
        <div class="paid-cell">
          <div class="checkbox ${item.paid ? 'checked' : ''}" data-field="paid">
            <svg viewBox="0 0 24 24" fill="none" stroke="#0b2620" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
          <span class="paid-label">${item.paid ? 'Paid' : 'Unpaid'}</span>
        </div>
        <div class="date-cell ${item.paidDate ? '' : 'empty'}">
          <input type="text" value="${escapeAttr(item.paidDate || '')}" data-field="paidDate" placeholder="—" />
        </div>
        <button class="del-btn" data-field="delete" aria-label="Delete expense" title="Delete">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18"></path><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path></svg>
        </button>
      `;
      container.appendChild(row);
    });
  }

  function getItem(itemId) { return state.items.find(i => i.id === itemId); }

  let dragId = null;

  document.getElementById(id + '-rows').addEventListener('dragstart', (e) => {
    const row = e.target.closest('.row');
    if (!row) return;
    dragId = row.dataset.id;
    row.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', dragId); } catch (err) {}
  });

  document.getElementById(id + '-rows').addEventListener('dragend', (e) => {
    const row = e.target.closest('.row');
    if (row) row.classList.remove('dragging');
    document.querySelectorAll('#' + id + '-rows .row').forEach(r => {
      r.classList.remove('drag-over-top', 'drag-over-bottom');
    });
    dragId = null;
  });

  document.getElementById(id + '-rows').addEventListener('dragover', (e) => {
    const row = e.target.closest('.row');
    if (!row || row.dataset.id === dragId) return;
    e.preventDefault();
    const rect = row.getBoundingClientRect();
    const before = (e.clientY - rect.top) < rect.height / 2;
    row.classList.toggle('drag-over-top', before);
    row.classList.toggle('drag-over-bottom', !before);
  });

  document.getElementById(id + '-rows').addEventListener('dragleave', (e) => {
    const row = e.target.closest('.row');
    if (row) row.classList.remove('drag-over-top', 'drag-over-bottom');
  });

  document.getElementById(id + '-rows').addEventListener('drop', (e) => {
    const row = e.target.closest('.row');
    if (!row || !dragId || row.dataset.id === dragId) return;
    e.preventDefault();
    const rect = row.getBoundingClientRect();
    const before = (e.clientY - rect.top) < rect.height / 2;
    row.classList.remove('drag-over-top', 'drag-over-bottom');

    const fromIdx = state.items.findIndex(i => i.id === dragId);
    let toIdx = state.items.findIndex(i => i.id === row.dataset.id);
    if (fromIdx === -1 || toIdx === -1) return;
    const [moved] = state.items.splice(fromIdx, 1);
    toIdx = state.items.findIndex(i => i.id === row.dataset.id);
    state.items.splice(before ? toIdx : toIdx + 1, 0, moved);

    renderRows();
    persist();
  });

  async function persist() { await saveMonth(state.currentMonth, state.items); }


  document.getElementById(id + '-rows').addEventListener('input', (e) => {
    const field = e.target.dataset.field;
    if (!field) return;
    const row = e.target.closest('.row');
    const item = getItem(row.dataset.id);
    if (!item) return;
    if (field === 'amount') item.amount = parseFloat(e.target.value) || 0;
    else if (field === 'instPaid') item.instPaid = parseInt(e.target.value, 10) || 0;
    else if (field === 'instTotal') item.instTotal = e.target.value === '' ? null : (parseInt(e.target.value, 10) || 0);
    else if (field === 'dueDate') {
      item.dueDate = e.target.value;
      const wrap = e.target.closest('.date-picker-wrap');
      if (wrap) {
        wrap.classList.toggle('has-date', !!item.dueDate);
        wrap.title = item.dueDate ? formatDueDate(item.dueDate) : 'Set due date';
      }
    }
    else item[field] = e.target.value;
    renderStats();
    renderInstallments();
    renderCalendar();
    persist();
  });

  document.getElementById(id + '-rows').addEventListener('click', (e) => {
    const checkbox = e.target.closest('.checkbox');
    const delBtn = e.target.closest('.del-btn');
    const instToggle = e.target.closest('.inst-toggle');
    if (checkbox) {
      const row = checkbox.closest('.row');
      const item = getItem(row.dataset.id);
      if (!item) return;
      item.paid = !item.paid;
      item.paidDate = item.paid ? todayStr() : '';
      renderRows();
      renderStats();
      renderInstallments();
      persist();
      return;
    }
    if (instToggle) {
      const row = instToggle.closest('.row');
      const item = getItem(row.dataset.id);
      if (!item) return;
      item.isInstallment = !item.isInstallment;
      renderRows();
      renderInstallments();
      persist();
      return;
    }
    if (delBtn) {
      const row = delBtn.closest('.row');
      state.items = state.items.filter(i => i.id !== row.dataset.id);
      renderRows();
      renderStats();
      renderInstallments();
      renderCalendar();
      persist();
    }
  });

  document.getElementById(id + '-add-expense-btn').addEventListener('click', () => {
    state.items.push({ id: uid(), name: '', amount: 0, due: '', dueDate: '', paid: false, paidDate: '', isInstallment: false, instPaid: 0, instTotal: null });
    renderRows();
    renderStats();
    renderInstallments();
    renderCalendar();
    const inputs = document.querySelectorAll('#' + id + '-rows .name-cell input');
    if (inputs.length) inputs[inputs.length - 1].focus();
    persist();
  });

  document.getElementById(id + '-month-select').addEventListener('change', async (e) => {
    state.currentMonth = e.target.value;
    await switchToMonth(state.currentMonth);
  });

  document.getElementById(id + '-new-month-btn').addEventListener('click', async () => {
    const label = prompt('New month (e.g. 2026-08 for August 2026):', nextMonthKey(state.currentMonth));
    if (!label) return;
    const key = label.trim();
    if (!/^\d{4}-\d{2}$/.test(key)) { alert('Please use YYYY-MM format, e.g. 2026-08'); return; }
    if (!state.months.includes(key)) {
      state.months.push(key);
      state.months.sort();
      await saveMonthsList();
    }
    state.currentMonth = key;
    renderMonthSelect();
    await switchToMonth(key, true);
  });

  document.getElementById(id + '-dup-btn').addEventListener('click', async () => {
    const idx = state.months.indexOf(state.currentMonth);
    const prevKey = idx > 0 ? state.months[idx - 1] : null;
    if (!prevKey) { alert('No earlier month to copy from.'); return; }
    const prevItems = await loadMonth(prevKey);
    if (!prevItems || !prevItems.length) { alert('That month has no items to copy.'); return; }
    state.items = prevItems.map(it => ({ ...it, id: uid(), paid: false, paidDate: '' }));
    state.selectedMoveId = null;
    renderRows();
    renderStats();
    renderInstallments();
    renderCalendar();
    persist();
  });

  function nextMonthKey(key) {
    const [y, m] = key.split('-').map(Number);
    const d = new Date(y, m, 1);
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
  }

  async function switchToMonth(key, isNew) {
    let data = await loadMonth(key);
    if (!data) {
      if (key === SEEDS[kind].month && !isNew) {
        data = SEEDS[kind].items.map(it => ({ ...it, id: uid() }));
        await saveMonth(key, data);
      } else {
        data = [];
      }
    }
    state.items = data;
    state.selectedMoveId = null;
    renderRows();
    renderStats();
    renderInstallments();
    renderCalendar();
  }

  async function init() {
    const storedMonths = await loadMonthsList();
    if (storedMonths && storedMonths.length) {
      state.months = storedMonths;
      if (!state.months.includes(SEEDS[kind].month)) { state.months.push(SEEDS[kind].month); state.months.sort(); }
    } else {
      state.months = [SEEDS[kind].month];
    }
    state.currentMonth = state.months[state.months.length - 1];
    renderMonthSelect();
    await switchToMonth(state.currentMonth);
    await saveMonthsList();
  }

  init();
}

function startApp() {
  makeTracker('personal', 'personal');
  makeTracker('shared', 'shared');
}

(function boot() {
  const cfg = getConfig();
  if (cfg && cfg.url && cfg.pass) {
    document.getElementById('cfg-url').value = cfg.url;
    document.getElementById('setup-gate').style.display = 'none';
    document.getElementById('app-content').classList.add('ready');
    startApp();
  }
})();
</script>
</body>
